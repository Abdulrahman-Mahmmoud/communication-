<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Communication Skills Question Bank</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #2d3748;
            --text-muted: #718096;
            --primary: #319795;
            --primary-hover: #2c7a7b;
            --success: #38a169;
            --danger: #e53e3e;
            --border-color: #e2e8f0;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
            --card-bg: rgba(26, 32, 44, 0.95);
            --text-main: #f7fafc;
            --text-muted: #a0aec0;
            --primary: #4fd1c5;
            --primary-hover: #319795;
            --success: #48bb78;
            --danger: #f56565;
            --border-color: #4a5568;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            transition: background 0.3s ease, color 0.3s ease, transform 0.2s ease;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            animation: fadeInDown 0.5s ease;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary);
        }

        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.6rem;
            border-radius: 8px;
            cursor: pointer;
        }

        .mode-selector {
            display: flex;
            background: var(--border-color);
            padding: 0.3rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
            animation: fadeIn 0.6s ease;
        }

        .mode-btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            background: none;
            color: var(--text-muted);
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
        }

        .mode-btn.active {
            background: var(--card-bg);
            color: var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .timer-card {
            background: var(--danger);
            color: white;
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 2rem;
            display: none;
            box-shadow: var(--shadow);
            animation: pulse 2s infinite;
        }

        .question-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.5s ease-out;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .options-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .option-item {
            padding: 1rem;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            font-weight: 400;
            background: transparent;
        }

        .option-item:hover {
            border-color: var(--primary);
            background: rgba(79, 209, 197, 0.05);
            transform: translateX(5px);
        }

        /* Classes for instant validation & results */
        .option-item.correct {
            background-color: rgba(56, 161, 105, 0.15) !important;
            border-color: var(--success) !important;
            color: var(--success) !important;
            font-weight: 600;
        }

        .option-item.incorrect {
            background-color: rgba(229, 62, 98, 0.15) !important;
            border-color: var(--danger) !important;
            color: var(--danger) !important;
        }

        .option-item.selected {
            border-color: var(--primary) !important;
            background-color: rgba(79, 209, 197, 0.1) !important;
        }

        .submit-area {
            display: flex;
            justify-content: center;
            margin: 2rem 0;
        }

        .result-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2.5rem;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            display: none;
            animation: zoomIn 0.5s ease;
        }

        .result-score {
            font-size: 3rem;
            font-weight: 700;
            color: var(--primary);
            margin: 1rem 0;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Communication Skills Bank</h1>
        <div class="controls">
            <button class="theme-toggle" id="themeToggle" title="Toggle Theme">🌓</button>
        </div>
    </header>

    <div class="mode-selector">
        <button class="mode-btn active" id="practiceModeBtn" onclick="setMode('practice')">Practice Mode</button>
        <button class="mode-btn" id="examModeBtn" onclick="setMode('exam')">Exam Mode (1 Hour)</button>
    </div>

    <div class="timer-card" id="timerCard">Time Remaining: 60:00</div>

    <div id="questionsContainer"></div>

    <div class="submit-area" id="submitArea" style="display: none;">
        <button class="btn btn-primary" style="font-size: 1.1rem; padding: 1rem 2rem;" onclick="submitExam()">Submit Exam</button>
    </div>

    <div class="result-card" id="resultCard">
        <h2>Exam Completed!</h2>
        <div class="result-score" id="resultScore">0/0</div>
        <p id="resultFeedback" style="font-size: 1.1rem; margin-bottom: 1.5rem; color: var(--text-muted);"></p>
        <button class="btn btn-primary" style="margin: 0 auto;" onclick="resetQuiz()">Restart</button>
    </div>
</div>

<script>
    // System Theme Initialization
    const themeToggle = document.getElementById('themeToggle');
    themeToggle.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
    });

    // Complete Question Bank Array
    const questions = [
        {
            id: 1,
            type: "mcq",
            text: "A nurse is conducting an admission assessment on an older adult client. To ensure effective verbal communication and pick the most appropriate technique, which client factor is most critical for the nurse to assess first?",
            options: [
                "A) The client's specific personal interests and hobbies.",
                "B) The client's ultimate career background before retirement.",
                "C) The client's sensory abilities, specifically hearing and vision.",
                "D) The client's marital status and living arrangements."
            ],
            correct: 2
        },
        {
            id: 2,
            type: "mcq",
            text: "During a community health presentation about vaccination dates, the nurse delivers information directly to a large audience without allocating time for a question-and-answer session. Which statement best reflects a major risk associated with this approach?",
            options: [
                "A) The audience will automatically reject the information completely.",
                "B) There is no immediate opportunity to clear up misunderstandings among the audience.",
                "C) The nurse can instantly monitor and adapt the content based on immediate needs.",
                "D) The message becomes too complex for the audience to process sequentially."
            ],
            correct: 1
        },
        {
            id: 3,
            type: "mcq",
            text: "A nurse leader is designing a health education brochure for a culturally diverse community. To increase the likelihood that community members will accept and trust the health advice, which strategy should the nurse prioritize?",
            options: [
                "A) Utilize a complex academic vocabulary to establish formal clinical authority.",
                "B) Avoid using pictures or visual signs, relying exclusively on written text instructions.",
                "C) Deliver the same generalized message format used for all other regional populations.",
                "D) Ensure the message reflects the shared culture, education, and language of the target audience."
            ],
            correct: 3
        },
        {
            id: 4,
            type: "mcq",
            text: "A nurse observes a client who claims to have no pain, but notices the client is grimacing, avoiding eye contact, and tightly holding their abdomen. Based on communication principles, how should the nurse interpret these findings?",
            options: [
                "A) Verbal communication is always the most accurate indicator of a client's status.",
                "B) The client's nonverbal body language is likely providing the most accurate clinical message.",
                "C) The client is successfully utilizing a two-way feedback loop to clarify their state.",
                "D) The nurse should ignore the physical gestures since the explicit words were clear."
            ],
            correct: 1
        },
        {
            id: 5,
            type: "mcq",
            text: "When developing a new educational plan regarding diabetes management, the nurse's first operational step should be focused on which component of the communication process?",
            options: [
                "A) Selecting a combined formal audio-visual transmission channel.",
                "B) Evaluating the feedback mechanism to measure cognitive behavior changes.",
                "C) Analyzing the specific characteristics and sociocultural factors of the intended audience.",
                "D) Converting the intangible ideas into theoretical signs during encoding."
            ],
            correct: 2
        },
        {
            id: 6,
            type: "mcq",
            text: "A nurse explains a complex medication schedule to a client. Which action by the nurse represents the best method to implement a true two-way communication loop before discharging the client?",
            options: [
                "A) Handing the client a beautifully printed brochure containing the scheduled times.",
                "B) Assuming the client fully understands because they smiled pleasantly and nodded rapidly.",
                "C) Speaking rapidly and authoritatively to ensure all points are delivered on time.",
                "D) Asking the client to restate the schedule in their own words to verify understanding."
            ],
            correct: 3
        },
        {
            id: 7,
            type: "mcq",
            text: "The concept of communication is derived etymologically from the Latin word 'communicare'. What does this original root imply regarding the fundamental nature of the communication process?",
            options: [
                "A) It requires an authoritative command to dictate precise clinical behaviors.",
                "B) It is an act focused inherently on sharing, participating, or being in a relation with others.",
                "C) It is an isolated internal process of formulating intangible personal thoughts.",
                "D) It can only be achieved successfully if formal written contracts are established."
            ],
            correct: 1
        },
        {
            id: 8,
            type: "mcq",
            text: "A nurse is preparing a health message aimed at changing dietary habits in a community. According to the criteria for an effective message, the nurse must ensure that the recommendations are 'affordable and require minimum time or effort'. Which requirement does this specifically fulfill?",
            options: [
                "A) The recommendation must be epidemiologically correct.",
                "B) The recommendation must establish linear control over the receiver's actions.",
                "C) The recommendation must be feasible and realistic for the population.",
                "D) The recommendation must maximize the theoretical nature of encoding symbols."
            ],
            correct: 2
        },
        {
            id: 9,
            type: "mcq",
            text: "What is the primary difference between the 'feedback' component and the 'effect' component when evaluating a nursing communication intervention?",
            options: [
                "A) Feedback is entirely nonverbal, whereas effect is strictly verbal expression.",
                "B) Feedback is the mechanism to check if the message was understood; effect is the actual change in the receiver's knowledge, attitude, or practice.",
                "C) Effect is initiated exclusively by the sender, while feedback is controlled by environmental noise.",
                "D) Feedback occurs before encoding, whereas effect occurs during the selection of a channel."
            ],
            correct: 1
        },
        {
            id: 10,
            type: "mcq",
            text: "A nurse translates clinical guidelines regarding wound care into a series of simplified diagrams and basic instructions for a patient's caregiver. In the communication process, this conversion of intangible clinical concepts into symbols is known as:",
            options: [
                "A) Decoding",
                "B) Feedback",
                "C) Encoding",
                "D) Channeling"
            ],
            correct: 2
        },
        {
            id: 11,
            type: "mcq",
            text: "A nurse is caring for a patient with diabetes who needs medication adjustment, nutritional counseling, and foot care education. Which members of the healthcare team are MOST appropriate to collaborate with this patient?",
            options: [
                "A. Radiologist and speech therapist",
                "B. Dietitian and pharmacist",
                "C. Social worker and volunteer",
                "D. Respiratory therapist and psychologist"
            ],
            correct: 1
        },
        {
            id: 12,
            type: "mcq",
            text: "A healthcare team is in the \"storming\" stage of team development. Which behavior would the nurse MOST likely observe?",
            options: [
                "A. Members trust each other completely",
                "B. Team members focus entirely on goals",
                "C. Conflict occurs regarding assigned responsibilities",
                "D. Procedures and communication patterns are well established"
            ],
            correct: 2
        },
        {
            id: 13,
            type: "mcq",
            text: "Which statement BEST describes a principle of effective team-based healthcare?",
            options: [
                "A. Physicians should make all final decisions independently",
                "B. Team members should avoid role overlap",
                "C. Communication should occur only during emergencies",
                "D. Team members share common goals and responsibilities"
            ],
            correct: 3
        },
        {
            id: 14,
            type: "mcq",
            text: "A hospitalized patient suddenly develops cardiac arrest. Which type of healthcare team should respond FIRST?",
            options: [
                "A. Coordinating team",
                "B. Core team",
                "C. Ancillary team",
                "D. Contingency team"
            ],
            correct: 3
        },
        {
            id: 15,
            type: "mcq",
            text: "Which healthcare professional is MOST appropriate for teaching patient an adaptive method for dressing after a stroke?",
            options: [
                "A. Physiotherapist",
                "B. Occupational therapist",
                "C. Speech therapist",
                "D. Social worker"
            ],
            correct: 1
        },
        {
            id: 16,
            type: "mcq",
            text: "A nurse notices that a patient has difficulty swallowing after a brain injury. Which referral is PRIORITY?",
            options: [
                "A. Respiratory therapist",
                "B. Psychologist",
                "C. Speech therapist",
                "D. Dietitian"
            ],
            correct: 2
        },
        {
            id: 17,
            type: "mcq",
            text: "Which characteristic is ESSENTIAL for effective healthcare team members?",
            options: [
                "A. Independent decision-making only",
                "B. Limited communication between disciplines",
                "C. Understanding both personal and team roles",
                "D. Avoidance of shared responsibility"
            ],
            correct: 2
        },
        {
            id: 18,
            type: "mcq",
            text: "A patient asks the nurse who is responsible for analyzing blood samples to help diagnose disease. Which response by the nurse is correct?",
            options: [
                "A. \"The radiologist performs that function.\"",
                "B. \"The laboratory technician performs that function.\"",
                "C. \"The physiotherapist performs that function.\"",
                "D. \"The occupational therapist performs that function.\""
            ],
            correct: 1
        },
        {
            id: 19,
            type: "mcq",
            text: "Which action demonstrates effective leadership within a healthcare team?",
            options: [
                "A. Ignoring team conflicts",
                "B. Limiting communication among members",
                "C. Coordinating and facilitating team activities",
                "D. Allowing only senior staff to contribute ideas"
            ],
            correct: 2
        },
        {
            id: 20,
            type: "mcq",
            text: "A patient with chronic obstructive pulmonary disease (COPD) is experiencing severe breathing difficulty. Which healthcare professional should the nurse notify FIRST?",
            options: [
                "A. Speech therapist",
                "B. Respiratory therapist",
                "C. Social worker",
                "D. Occupational therapist"
            ],
            correct: 1
        },
        {
            id: 21,
            type: "mcq",
            text: "A newly formed healthcare team in a rehabilitation unit is experiencing confusion regarding responsibilities. Some members are unsure about tasks, and communication is superficial. Which stage of team development is the team MOST likely experiencing?",
            options: [
                "A. Forming",
                "B. Performing",
                "C. Norming",
                "D. Storming"
            ],
            correct: 0
        },
        {
            id: 22,
            type: "mcq",
            text: "A nurse observes tension between healthcare team members because several professionals believe their responsibilities overlap. Patient care is beginning to suffer. Which challenge to effective teamwork is MOST likely causing this issue?",
            options: [
                "A. Shared leadership",
                "B. Changing roles",
                "C. Mutual respect",
                "D. Measurable outcomes"
            ],
            correct: 1
        },
        {
            id: 23,
            type: "mcq",
            text: "A patient recovering from amputation is learning to perform activities of daily living independently. Which healthcare team member is MOST appropriate to assist this patient?",
            options: [
                "A. Occupational therapist",
                "B. Respiratory therapist",
                "C. Dentist",
                "D. Radiology technologist"
            ],
            correct: 0
        },
        {
            id: 24,
            type: "mcq",
            text: "The nurse manager wants to improve teamwork within the unit. Which intervention would BEST promote effective communication?",
            options: [
                "A. Restrict communication to written reports",
                "B. Encourage accessible communication channels among all team members",
                "C. Require only physicians to speak during meetings",
                "D. Limit interdisciplinary rounds"
            ],
            correct: 1
        },
        {
            id: 25,
            type: "mcq",
            text: "A patient tells the nurse, \"I'm overwhelmed emotionally and financially after my cancer diagnosis.\" Which referral is MOST appropriate?",
            options: [
                "A. Social worker",
                "B. Pharmacist",
                "C. Radiologist",
                "D. Physiotherapist"
            ],
            correct: 0
        },
        {
            id: 26,
            type: "mcq",
            text: "A healthcare team has excellent clinical expertise but poor patient outcomes because members frequently misunderstand treatment plans. Which principle of team-based healthcare is MOST lacking?",
            options: [
                "A. Leadership",
                "B. Effective communication",
                "C. Mutual trust",
                "D. Shared goals"
            ],
            correct: 1
        },
        {
            id: 27,
            type: "mcq",
            text: "A nurse is working with a highly effective healthcare team. Which outcome would the nurse EXPECT?",
            options: [
                "A. Increased hospitalization costs",
                "B. Reduced professional diversity",
                "C. Improved patient satisfaction and fewer medical errors",
                "D. Delayed access to healthcare services"
            ],
            correct: 2
        },
        {
            id: 28,
            type: "mcq",
            text: "Which scenario BEST reflects mutual trust and respect among healthcare team members?",
            options: [
                "A. A physician dismisses the nurse's concerns about medication safety",
                "B. Team members value each professional's contribution to patient care",
                "C. Communication occurs only through formal documentation",
                "D. Junior staff members avoid sharing opinions"
            ],
            correct: 1
        },
        {
            id: 29,
            type: "mcq",
            text: "A patient with severe depression and sleep disturbances following trauma is admitted to the hospital. Which healthcare professional is MOST appropriate for managing these emotional concerns?",
            options: [
                "A. Psychologist",
                "B. Radiologist",
                "C. Pharmacist",
                "D. Physiotherapist"
            ],
            correct: 0
        },
        {
            id: 30,
            type: "mcq",
            text: "A healthcare team has reached the \"performing\" stage. Which observation by the nurse BEST indicates this stage?",
            options: [
                "A. Team members openly challenge the goals",
                "B. Members avoid collaboration",
                "C. The team works effectively toward common goals with trust and support",
                "D. Roles remain unclear among members"
            ],
            correct: 2
        },
        {
            id: 31,
            type: "mcq",
            text: "A nurse is caring for a patient who speaks limited English. Which action by the nurse best demonstrates effective communication in a healthcare setting?",
            options: [
                "A. Speaking louder and using complex medical terms",
                "B. Using simple language, slowly, and confirming understanding with teach-back",
                "C. Relying only on written instructions in English",
                "D. Asking family members to interpret all information"
            ],
            correct: 1
        },
        {
            id: 32,
            type: "mcq",
            text: "During a patient handover, a nurse is presenting information to the oncoming shift. Which strategy will most effectively enhance the presentation?",
            options: [
                "A. Speaking quickly to cover all details in a short time",
                "B. Planning the presentation, using clear verbal and nonverbal cues, and adding visuals",
                "C. Reading directly from the patient's chart without eye contact",
                "D. Using only medical jargon to appear professional"
            ],
            correct: 1
        },
        {
            id: 33,
            type: "mcq",
            text: "A patient from a different cultural background seems uncomfortable during the conversation. What should the nurse do first?",
            options: [
                "A. Assume the patient is being rude",
                "B. Demonstrate cultural awareness by assessing language needs and using preferred names/pronouns",
                "C. Continue the conversation without adjustment",
                "D. Terminate the interaction immediately"
            ],
            correct: 1
        },
        {
            id: 34,
            type: "mcq",
            text: "Which type of communication is primarily occurring when a nurse reflects on their own feelings and thoughts before speaking with a difficult patient?",
            options: [
                "A. Interpersonal communication",
                "B. Public communication",
                "C. Intrapersonal communication",
                "D. Small-group communication"
            ],
            correct: 2
        },
        {
            id: 35,
            type: "mcq",
            text: "A nurse wants to build trust with a new patient. Which action is most important?",
            options: [
                "A. Sharing personal stories immediately",
                "B. Actively listening, telling the truth, and admitting mistakes when they occur",
                "C. Avoiding any discussion of negative topics",
                "D. Using only written communication"
            ],
            correct: 1
        },
        {
            id: 36,
            type: "mcq",
            text: "Which of the following is the best example of patient teach-back technique?",
            options: [
                "A. \"Do you understand the instructions I gave you?\"",
                "B. \"Can you explain in your own words how you will take this medication?\"",
                "C. \"I will repeat the instructions one more time.\"",
                "D. \"Most patients have no trouble with this medication.\""
            ],
            correct: 1
        },
        {
            id: 37,
            type: "mcq",
            text: "A patient avoids eye contact during an interview. What should the nurse consider?",
            options: [
                "A. The patient is not interested in the conversation",
                "B. The patient may be feeling fear, discomfort, or processing difficult information",
                "C. The patient is showing respect by not making eye contact",
                "D. The patient is ready to end the discussion"
            ],
            correct: 1
        },
        {
            id: 38,
            type: "mcq",
            text: "Which of the following is a key difference between verbal and nonverbal communication?",
            options: [
                "A. Verbal communication is always more accurate than nonverbal",
                "B. Nonverbal communication often reveals the actual emotions of a person",
                "C. Verbal communication can be easily documented",
                "D. Nonverbal communication can be easily documented"
            ],
            correct: 1
        },
        {
            id: 39,
            type: "mcq",
            text: "A nurse is educating a patient about wound care. Which statement indicates the best use of compassion in communication?",
            options: [
                "A. \"You must change the dressing exactly as instructed or it won't heal.\"",
                "B. \"I understand this is difficult for you. Let's go over the steps together and address your concerns.\"",
                "C. \"This is standard procedure for everyone.\"",
                "D. \"Don't worry about it; many patients manage fine.\""
            ],
            correct: 1
        },
        {
            id: 40,
            type: "mcq",
            text: "When communicating with colleagues, which behavior demonstrates excellent verbal communication skills?",
            options: [
                "A. Interrupting others to share ideas quickly",
                "B. Listening carefully without interrupting and maintaining eye contact",
                "C. Speaking very softly so others must strain to hear",
                "D. Using only closed-ended questions"
            ],
            correct: 1
        },
        {
            id: 41,

    let currentMode = 'practice';
    let userAnswers = {};
    let examInterval = null;
    let examTimeLeft = 3600; // 1 hour in seconds

    // Render App
    function renderQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        
        questions.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `q-card-${q.id}`;
            
            const text = document.createElement('div');
            text.className = 'question-text';
            text.innerHTML = `<strong>Q${idx + 1}:</strong> ${q.text}`;
            card.appendChild(text);
            
            const optionsList = document.createElement('ul');
            optionsList.className = 'options-list';
            
            q.options.forEach((opt, oIdx) => {
                const item = document.createElement('li');
                item.className = 'option-item';
                item.innerText = opt;
                item.id = `opt-${q.id}-${oIdx}`;
                
                item.onclick = () => handleOptionClick(q.id, oIdx, item);
                optionsList.appendChild(item);
            });
            
            card.appendChild(optionsList);
            container.appendChild(card);
        });
    }

    function handleOptionClick(qId, oIdx, element) {
        if (currentMode === 'practice') {
            const q = questions.find(item => item.id === qId);
            const card = document.getElementById(`q-card-${qId}`);
            const allOptions = card.querySelectorAll('.option-item');
            
            // Disable further clicks for this card in practice mode
            allOptions.forEach(opt => opt.style.pointerEvents = 'none');
            
            if (oIdx === q.correct) {
                element.classList.add('correct');
            } else {
                element.classList.add('incorrect');
                document.getElementById(`opt-${qId}-${q.correct}`).classList.add('correct');
            }
        } else if (currentMode === 'exam') {
            userAnswers[qId] = oIdx;
            const card = document.getElementById(`q-card-${qId}`);
            const allOptions = card.querySelectorAll('.option-item');
            allOptions.forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
        }
    }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('practiceModeBtn').classList.toggle('active', mode === 'practice');
        document.getElementById('examModeBtn').classList.toggle('active', mode === 'exam');
        
        if (mode === 'exam') {
            document.getElementById('timerCard').style.display = 'block';
            document.getElementById('submitArea').style.display = 'flex';
            document.getElementById('resultCard').style.display = 'none';
            document.getElementById('questionsContainer').style.display = 'block';
            startExamTimer();
        } else {
            clearInterval(examInterval);
            document.getElementById('timerCard').style.display = 'none';
            document.getElementById('submitArea').style.display = 'none';
            document.getElementById('resultCard').style.display = 'none';
            document.getElementById('questionsContainer').style.display = 'block';
        }
        resetQuizState();
    }

    function startExamTimer() {
        clearInterval(examInterval);
        examTimeLeft = 3600;
        updateTimerDisplay();
        
        examInterval = setInterval(() => {
            examTimeLeft--;
            updateTimerDisplay();
            if (examTimeLeft <= 0) {
                clearInterval(examInterval);
                submitExam();
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        const minutes = Math.floor(examTimeLeft / 60);
        const seconds = examTimeLeft % 60;
        document.getElementById('timerCard').innerText = `Time Remaining: ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    function submitExam() {
        clearInterval(examInterval);
        document.getElementById('timerCard').style.display = 'none';
        document.getElementById('submitArea').style.display = 'none';
        document.getElementById('questionsContainer').style.display = 'none';
        
        let score = 0;
        questions.forEach(q => {
            if (userAnswers[q.id] === q.correct) {
                score++;
            }
        });
        
        const resultCard = document.getElementById('resultCard');
        const resultScore = document.getElementById('resultScore');
        const resultFeedback = document.getElementById('resultFeedback');
        
        resultScore.innerText = `${score} / ${questions.length}`;
        const percentage = (score / questions.length) * 100;
        
        if (percentage >= 85) {
            resultFeedback.innerText = "Excellent performance! You are fully prepared.";
        } else if (percentage >= 60) {
            resultFeedback.innerText = "Good job! Review the incorrect answers for better results.";
        } else {
            resultFeedback.innerText = "Keep practicing. Consistency is key.";
        }
        
        resultCard.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetQuizState() {
        userAnswers = {};
        renderQuiz();
    }

    function resetQuiz() {
        setMode('practice');
    }

    // Initialize application on load
    window.onload = () => {
        renderQuiz();
    };
</script>
